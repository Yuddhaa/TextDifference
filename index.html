<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Difference</title>
    <link rel="icon"
        href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+CiAgPHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iNiIgZmlsbD0iIzRmNDZlNSIvPgogIDxwYXRoIGQ9Ik0xMCAxNmg0bS0yLTJ2NG04LTJoNCIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIyLjUiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIvPgogIDxwYXRoIGQ9Ik03IDEwbC0yIDYgMiA2TTI1IDEwbDIgNi0yIDYiIGZpbGw9Im5vbmUiIHN0cm9rZT0id2hpdGUiIHN0cm9rZS1vcGFjaXR5PSIwLjUiIHN0cm9rZS13aWR0aD0iMiIvPgo8L3N2Zz4=">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/diff-match-patch/1.0.5/index.min.js"></script>
    <script>
        tailwind.config = {darkMode: 'class'}
    </script>
    <style>
        /* Light mode colors */
        .diff-added {
            background-color: #dcfce7;
            color: #166534;
        }

        .diff-removed {
            background-color: #fee2e2;
            color: #991b1b;
        }

        /* Dark mode colors */
        .dark .diff-added {
            background-color: #064e3b;
            color: #4ade80;
        }

        .dark .diff-removed {
            background-color: #7f1d1d;
            color: #f87171;
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>

<body class="bg-slate-50 dark:bg-slate-950 min-h-screen p-4 md:p-8 font-sans transition-colors duration-200">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" class="w-full h-full drop-shadow-sm">
                        <rect width="32" height="32" rx="8" fill="#4f46e5" />
                        <path d="M10 16h4m-2-2v4m8-2h4" stroke="white" stroke-width="2.5" stroke-linecap="round" />
                        <path d="M7 10l-2 6 2 6M25 10l2 6-2 6" fill="none" stroke="white" stroke-opacity="0.5"
                            stroke-width="2" />
                    </svg>
                </div>

                <div>
                    <h1
                        class="text-2xl font-black text-slate-800 dark:text-slate-100 tracking-tight leading-none uppercase">
                        Text<span class="text-indigo-600">Difference</span>
                    </h1>
                    <p class="text-sm text-slate-500 dark:text-slate-400 font-medium mt-1">
                        Compare code snippets instantly and locally.
                    </p>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()"
                    class="p-2 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-400 hover:border-indigo-500 transition-all">
                    <span id="themeIcon">🌙</span>
                </button>
                <button onclick="clearAll()"
                    class="text-xs font-bold text-slate-400 hover:text-red-500 transition-colors uppercase tracking-wider">
                    Clear All
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="space-y-2">
                <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Original (Old)</label>
                <textarea id="textA"
                    class="w-full h-64 p-4 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 dark:text-slate-100 shadow-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none font-mono text-sm"
                    placeholder="Paste old code here..."></textarea>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Changed (New)</label>
                <textarea id="textB"
                    class="w-full h-64 p-4 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 dark:text-slate-100 shadow-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none font-mono text-sm"
                    placeholder="Paste new code here..."></textarea>
            </div>
        </div>

        <div id="resultContainer" class="hidden">
            <h2 class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2">Difference</h2>
            <div id="output"
                class="w-full p-6 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 dark:text-slate-200 shadow-inner font-mono text-sm leading-relaxed overflow-x-auto whitespace-pre-wrap">
            </div>
        </div>
    </div>

    <script>
        const textA = document.getElementById('textA');
        const textB = document.getElementById('textB');
        const output = document.getElementById('output');
        const resultContainer = document.getElementById('resultContainer');
        const themeIcon = document.getElementById('themeIcon');
        const dmp = new diff_match_patch();

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            themeIcon.innerText = isDark ? '☀️' : '🌙';
        }

        function computeDiff() {
            const val1 = textA.value;
            const val2 = textB.value;

            if (!val1 && !val2) {
                resultContainer.classList.add('hidden');
                return;
            }

            resultContainer.classList.remove('hidden');

            const diffs = dmp.diff_main(val1, val2);
            dmp.diff_cleanupSemantic(diffs);

            let html = '';
            diffs.forEach((part) => {
                const type = part[0]; // 0: equal, 1: add, -1: remove
                const text = part[1].replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

                if (type === 1) {
                    html += `<span class="diff-added">${text}</span>`;
                } else if (type === -1) {
                    html += `<span class="diff-removed">${text}</span>`;
                } else {
                    html += `<span>${text}</span>`;
                }
            });

            output.innerHTML = html;
        }

        function clearAll() {
            textA.value = '';
            textB.value = '';
            computeDiff();
        }

        textA.addEventListener('input', computeDiff);
        textB.addEventListener('input', computeDiff);
    </script>
</body>

</html>
